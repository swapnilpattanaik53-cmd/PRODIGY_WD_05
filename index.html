<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Weather Data</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="clear">

  <div class="sky-wrap"><div class="sky" id="sky"></div></div>
  <div class="scrim"></div>
  <div class="vignette"></div>
  <div class="glow sun" id="sunGlow"></div>
  <div class="glow moon" id="moonGlow"></div>
  <div class="stars" id="stars"></div>
  <div class="clouds-bg" id="cloudsBg"></div>
  <div class="rain-layer" id="rainLayer"></div>
  <div class="snow-layer" id="snowLayer"></div>
  <div class="fog-layer" id="fogLayer"></div>
  <div class="lightning" id="lightning"></div>

  <main class="app">
    <header class="topbar">
      <div class="brand">Weather Forecast</div>
      <form class="search" id="searchForm" autocomplete="off">
        <input id="searchInput" placeholder="Search city or place…" />
        <button type="submit" class="search-go" aria-label="Search">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7" fill="none" stroke="#fff" stroke-width="2"/><line x1="16.2" y1="16.2" x2="21" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </form>
      <button class="locate-btn" id="locateBtn">📍 My location</button>
      <button class="unit-toggle" id="unitToggle">°C</button>
    </header>

    <div class="suggestions" id="suggestions"><ul id="suggestionList"></ul></div>

    <section class="hero" id="hero">
      <div class="hero-icon" id="heroIcon"></div>
      <div class="hero-info">
        <div class="temp-row">
          <div class="temp" id="tempVal">--°</div>
        </div>
        <div class="condition" id="conditionText">Loading current sky…</div>
        <div class="place" id="placeText">Locating you…</div>
        <div class="meta" id="metaText">&nbsp;</div>
        <div class="note" id="noteText"></div>
      </div>
    </section>

    <section class="stats" id="statsGrid"></section>

    <section class="hourly">
      <h2>Next hours</h2>
      <div class="hourly-scroll" id="hourlyScroll"></div>
    </section>

    <section class="daily">
      <h2>7-day outlook</h2>
      <div class="daily-list" id="dailyList"></div>
    </section>

    <div class="foot">Live Weather data forecasting.Stay for live updated weather data</div>
  </main>

<script src="script.js">

</script>
</body>
</html>
